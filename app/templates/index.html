<!DOCTYPE html>
<html>
    <head>
        <Title>local-cyber-feed</Title>
        <style>
            body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
            .article { border-bottom: 1px solid #eee; padding: 10px 0;}
        </style>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/pico.min.css') }}">
    </head>
    <body>
        <main class="container">
    <h1>local-cyber-feed</h1>

    <h2>Test Feeds</h2>
    <ul>
        {% for feed in feeds %}
            <li>{{ feed['title'] }}
                <form action="/api/delete-feed" method="POST" style="display:inline">
                    <input type="hidden" id="feed-id" name="feed-id" value={{ feed['id'] }} >
                    <input type="submit" value="X">
                </form>
            </li>
        {% endfor %}
    </ul>


    <form action="/api/add-feed" method="POST">
        <label for="add-feed">Add Feed</label>
        <input type="text" id="add-feed" name="add-feed">
        <input type="submit" value="Add">
    </form>
    <hr>
    <div id="update-banner" style="display:none;">
        <span id="update-msg"></span>
        <a href="javascript:location.reload()">New Articles Available</a>
    </div>
    <script>
        
        async function checkUpdates()
        {
            //console.log("Running checkUpdates()");
            
            const articles = document.querySelectorAll('.article');            
            let lastID = articles[0].getAttribute('articleID');

            let response = await fetch(`/api/check-updates/${lastID}`);
            let data = await response.json();

            if (data.new_articles > 0)
            {
                let banner = document.getElementById('update-banner');
                banner.style.display = 'block';
            }
            
        }
        setInterval(checkUpdates, 300000);

    </script>

    <h2>Recent Articles</h2>
    {% for article in articles %}
        <div class="article" articleID="{{ article['id']}}">
            <h3><a href="{{ article['link'] }}">{{ article['title'] }}</a></h3>
            <p>From: <em>{{ article['feed_name'] }}</em></p>
            <p>Date: <em class = "local-date" data-utc="{{ article['published_date'] }}">{{ article['published_date'] }} (UTC)</em></p>
        </div>
    {% endfor %}
</main>
</body>
<script>
    function convertToLocal() {

        const dateElements = document.querySelectorAll('.local-date');
        dateElements.forEach(el => {
            const utcString = el.getAttribute('data-utc');
            if (utcString) {
                const date = new Date(utcString + "Z"); 
                
                el.innerText = date.toLocaleString(undefined, {
                    dateStyle: 'medium',
                    timeStyle: 'short'
                });
            }
        });
    }

    convertToLocal();
</script>
</html>
